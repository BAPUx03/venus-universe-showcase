[build]
  command = "npm run build && npm run validate:seo && node scripts/prerender-static.mjs"
  publish = ".output/public"

[build.environment]
  NODE_VERSION = "20"
  DEPLOY_TARGET = "netlify"

# Hybrid hosting:
# - Frontend (this site) is served as a static SPA from Netlify.
# - Backend API routes (/api/public/*) live on Lovable (Cloudflare). The
#   frontend reads VITE_API_BASE_URL at build time and prefixes all
#   /api/public/* fetches with that URL — see src/lib/apiBase.ts.
#
# REQUIRED env vars on Netlify (Site settings → Environment variables):
#   VITE_API_BASE_URL          = https://venus-universe-showcase.lovable.app
#   VITE_SUPABASE_URL          = https://yszfvicefomtrwbzemct.supabase.co
#   VITE_SUPABASE_PUBLISHABLE_KEY = (anon key from .env)
#   VITE_SUPABASE_PROJECT_ID   = yszfvicefomtrwbzemct
#
[[redirects]]
  from = "https://www.venusuniverse.in/*"
  to = "https://venusuniverse.in/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/luxury-5bhk-ahmedabad"
  to = "/luxury-4bhk-ahmedabad"
  status = 301

[[redirects]]
  from = "/5bhk-nehrunagar-ahmedabad"
  to = "/4bhk-nehrunagar-ahmedabad"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
