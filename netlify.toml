[build]
  command = "npm run build"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "20"
  DEPLOY_TARGET = "netlify"

# Hybrid hosting:
# - Frontend (this site) is served as a static SPA from Netlify.
# - Backend API routes (/api/public/*) live on Lovable (Cloudflare).
#   The frontend reads VITE_API_BASE_URL at build time and prefixes
#   all /api/public/* fetches with the Lovable URL — see src/lib/apiBase.ts.
#
# REQUIRED env var on Netlify (Site settings → Environment variables):
#   VITE_API_BASE_URL = https://venus-universe-showcase.lovable.app
#
# SPA fallback so client-side routes (e.g. /eoi, /studio) work on refresh.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
